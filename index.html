<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coffee RAG Chatbot</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ef;
      --panel: #fffdf9;
      --text: #201a17;
      --muted: #6d625b;
      --border: #ded5cc;
      --user: #2f5f4f;
      --user-text: #ffffff;
      --assistant: #ffffff;
      --accent: #b65d32;
      --accent-soft: #f4dfd2;
      --shadow: 0 10px 30px rgba(64, 45, 34, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      padding: 18px 14px 104px;
    }

    .shell {
      width: min(880px, 100%);
      margin: 0 auto;
    }

    header {
      padding: 8px 2px 18px;
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .chat-thread {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 8px;
    }

    .message-row {
      display: flex;
      width: 100%;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.assistant {
      justify-content: flex-start;
    }

    .message-stack {
      max-width: min(760px, 86%);
    }

    .bubble {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      box-shadow: var(--shadow);
    }

    .user .bubble {
      background: var(--user);
      color: var(--user-text);
      border-color: transparent;
    }

    .assistant .bubble {
      background: var(--assistant);
      color: var(--text);
    }

    .bubble.markdown {
      white-space: normal;
    }

    .bubble.markdown p,
    .bubble.markdown ul,
    .bubble.markdown ol {
      margin: 0 0 10px;
    }

    .bubble.markdown p:last-child,
    .bubble.markdown ul:last-child,
    .bubble.markdown ol:last-child {
      margin-bottom: 0;
    }

    .bubble.markdown ul,
    .bubble.markdown ol {
      padding-left: 22px;
    }

    .bubble.markdown li {
      margin: 4px 0;
    }

    .bubble.markdown code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #f0e8df;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }

    .bubble.markdown a {
      color: var(--accent);
      font-weight: 700;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .meta-section {
      margin-top: 10px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .product-card {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr);
      gap: 12px;
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      color: inherit;
      text-decoration: none;
    }

    .product-card:focus,
    .product-card:hover {
      border-color: var(--accent);
      outline: none;
    }

    .product-image {
      width: 84px;
      height: 84px;
      border-radius: 6px;
      object-fit: cover;
      background: #eee6dd;
      border: 1px solid var(--border);
    }

    .product-body {
      min-width: 0;
    }

    .product-title {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 700;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .product-detail {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .product-price {
      color: var(--text);
      font-weight: 700;
    }

    .product-reason {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      margin-top: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #7a3519;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .source-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .source-chip {
      max-width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 0.82rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      box-shadow: var(--shadow);
    }

    .source-chip strong {
      color: var(--text);
      font-weight: 700;
    }

    .input-bar {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      background: rgba(247, 244, 239, 0.94);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .chat-form {
      display: flex;
      gap: 10px;
      width: min(880px, 100%);
      margin: 0 auto;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      min-height: 46px;
      max-height: 130px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: var(--text);
      background: #ffffff;
      font: inherit;
      line-height: 1.35;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(182, 93, 50, 0.16);
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      background: var(--accent);
      color: #ffffff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--muted);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (min-width: 720px) {
      .app {
        padding-top: 28px;
        padding-bottom: 112px;
      }

      h1 {
        font-size: 1.65rem;
      }

      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <header>
        <h1>Coffee RAG Chatbot</h1>
        <p class="subtitle">Ask about brewing, gear, flavor, or coffee product recommendations.</p>
      </header>

      <section id="chatThread" class="chat-thread" aria-live="polite" aria-label="Chat thread">
        <div class="message-row assistant">
          <div class="message-stack">
            <div class="bubble">Hi. Ask me for coffee help or product ideas, and I will keep the answer practical.</div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="input-bar">
    <form id="chatForm" class="chat-form">
      <textarea id="messageInput" name="message" rows="1" placeholder="Ask about coffee..." autocomplete="off" required></textarea>
      <button id="sendButton" type="submit">Send</button>
    </form>
  </div>

  <script>
    const API_BASE = 'https://coffee-rag-chatbot.onrender.com'; // Swap this for the Render URL when deployed.

    const chatThread = document.querySelector('#chatThread');
    const chatForm = document.querySelector('#chatForm');
    const messageInput = document.querySelector('#messageInput');
    const sendButton = document.querySelector('#sendButton');
    const PLACEHOLDER_IMAGE = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22168%22 height=%22168%22 viewBox=%220 0 168 168%22%3E%3Crect width=%22168%22 height=%22168%22 fill=%22%23eee6dd%22/%3E%3Ccircle cx=%2284%22 cy=%2284%22 r=%2238%22 fill=%22%23d6c8bc%22/%3E%3Cpath d=%22M62 82h42a20 20 0 0 1-40 0z%22 fill=%22%238b6a55%22/%3E%3Ctext x=%2284%22 y=%22131%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2213%22 fill=%22%236d625b%22%3ECoffee%3C/text%3E%3C/svg%3E';

    function scrollToLatest() {
      requestAnimationFrame(() => {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      });
    }

    function setLoading(isLoading) {
      sendButton.disabled = isLoading;
      messageInput.disabled = isLoading;
      sendButton.textContent = isLoading ? 'Sending' : 'Send';
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderInlineMarkdown(text) {
      return escapeHtml(text)
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>');
    }

    function markdownToHtml(markdown) {
      const lines = String(markdown || '').replace(/\r\n/g, '\n').split('\n');
      const html = [];
      let listType = null;

      function closeList() {
        if (listType) {
          html.push(`</${listType}>`);
          listType = null;
        }
      }

      lines.forEach((line) => {
        const trimmed = line.trim();

        if (!trimmed) {
          closeList();
          return;
        }

        const unordered = trimmed.match(/^[-*]\s+(.+)$/);
        const ordered = trimmed.match(/^\d+\.\s+(.+)$/);

        if (unordered || ordered) {
          const nextListType = unordered ? 'ul' : 'ol';
          if (listType !== nextListType) {
            closeList();
            html.push(`<${nextListType}>`);
            listType = nextListType;
          }

          html.push(`<li>${renderInlineMarkdown((unordered || ordered)[1])}</li>`);
          return;
        }

        closeList();
        html.push(`<p>${renderInlineMarkdown(trimmed)}</p>`);
      });

      closeList();
      return html.join('');
    }

    function createBubble(role, text, options = {}) {
      const row = document.createElement('div');
      row.className = `message-row ${role}`;

      const stack = document.createElement('div');
      stack.className = 'message-stack';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (options.markdown) {
        bubble.classList.add('markdown');
        bubble.innerHTML = markdownToHtml(text);
      } else {
        bubble.textContent = text || '';
      }

      stack.append(bubble);
      row.append(stack);
      chatThread.append(row);
      scrollToLatest();

      return { row, stack, bubble };
    }

    function createTypingIndicator() {
      const message = createBubble('assistant', '');
      const typing = document.createElement('span');
      typing.className = 'typing';

      const spinner = document.createElement('span');
      spinner.className = 'spinner';
      spinner.setAttribute('aria-hidden', 'true');

      const label = document.createElement('span');
      label.textContent = 'Thinking...';

      typing.append(spinner, label);
      message.bubble.append(typing);
      return message.row;
    }

    function renderProducts(stack, products) {
      if (!Array.isArray(products) || products.length === 0) return;

      const section = document.createElement('div');
      section.className = 'meta-section product-grid';

      products.forEach((product) => {
        const item = product && typeof product === 'object' ? product : {};
        const card = document.createElement(item.link ? 'a' : 'article');
        card.className = 'product-card';

        if (item.link) {
          card.href = item.link;
          card.target = '_blank';
          card.rel = 'noopener noreferrer';
        }

        const image = document.createElement('img');
        image.className = 'product-image';
        image.alt = item.title ? `${item.title} product image` : 'Coffee product image';
        image.src = item.image || PLACEHOLDER_IMAGE;
        image.loading = 'lazy';
        image.addEventListener('error', () => {
          image.src = PLACEHOLDER_IMAGE;
        }, { once: true });

        const body = document.createElement('div');
        body.className = 'product-body';

        const title = document.createElement('h2');
        title.className = 'product-title';
        title.textContent = item.title || 'Untitled coffee product';

        const price = document.createElement('p');
        price.className = 'product-detail product-price';
        price.textContent = item.price || 'Price unavailable';

        const source = document.createElement('p');
        source.className = 'product-detail';
        source.textContent = item.source || 'Source unavailable';

        body.append(title, price, source);

        if (item.rating !== null && item.rating !== undefined && item.rating !== '') {
          const rating = document.createElement('p');
          rating.className = 'product-detail';
          rating.textContent = `Rating: ${item.rating}`;
          body.append(rating);
        }

        if (item.rerankReason) {
          const reason = document.createElement('p');
          reason.className = 'product-reason';
          reason.textContent = item.rerankReason;
          body.append(reason);
        }

        if (item.beginnerFriendly === true) {
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = 'Beginner friendly';
          body.append(badge);
        }

        card.append(image, body);
        section.append(card);
      });

      stack.append(section);
    }

    function renderSources(stack, sources) {
      if (!Array.isArray(sources) || sources.length === 0) return;

      const section = document.createElement('div');
      section.className = 'meta-section source-list';

      sources.forEach((source) => {
        const item = source && typeof source === 'object' ? source : {};
        const chip = document.createElement('span');
        chip.className = 'source-chip';

        const title = document.createElement('strong');
        title.textContent = item.title || 'Untitled source';

        const category = document.createElement('span');
        category.textContent = ` - ${item.category || 'uncategorized'}`;

        chip.append(title, category);
        section.append(chip);
      });

      stack.append(section);
    }

    function renderAssistantResponse(data) {
      const reply = data && typeof data.reply === 'string' && data.reply.trim()
        ? data.reply
        : 'I found a response, but it did not include readable reply text.';

      const message = createBubble('assistant', reply, { markdown: true });
      renderProducts(message.stack, data ? data.products : []);
      renderSources(message.stack, data ? data.sources : []);
      scrollToLatest();
    }

    function renderFriendlyError() {
      createBubble('assistant', 'Sorry, I could not get a response just now. Please check that the local API is running and try again.');
    }

    async function sendMessage(message) {
      const response = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message })
      });

      let payload = null;
      try {
        payload = await response.json();
      } catch (error) {
        payload = null;
      }

      if (!response.ok) {
        throw new Error(payload && payload.error ? payload.error : 'Chat request failed');
      }

      return payload || {};
    }

    chatForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const message = messageInput.value.trim();
      if (!message) return;

      createBubble('user', message);
      messageInput.value = '';
      setLoading(true);

      const typingRow = createTypingIndicator();

      try {
        const data = await sendMessage(message);
        typingRow.remove();
        renderAssistantResponse(data);
      } catch (error) {
        typingRow.remove();
        renderFriendlyError();
      } finally {
        setLoading(false);
        messageInput.focus();
        scrollToLatest();
      }
    });

    messageInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        chatForm.requestSubmit();
      }
    });
  </script>
</body>
</html>
